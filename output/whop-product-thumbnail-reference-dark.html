<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1600px;
        height: 900px;
        overflow: hidden;
        background: #050711;
        color: #edf2ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        position: relative;
      }

      .scene {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(760px 560px at 20% 8%, rgba(139, 111, 255, 0.28), transparent 64%),
          radial-gradient(720px 520px at 92% 16%, rgba(34, 217, 255, 0.20), transparent 66%),
          linear-gradient(135deg, #090b18 0%, #07101d 47%, #040610 100%);
      }

      .clock-ghost {
        position: absolute;
        left: 352px;
        top: -188px;
        width: 360px;
        height: 360px;
        border: 26px solid rgba(125, 164, 255, 0.15);
        border-radius: 50%;
        opacity: 0.9;
      }

      .clock-ghost::before,
      .clock-ghost::after {
        content: "";
        position: absolute;
        left: 165px;
        top: 62px;
        width: 24px;
        border-radius: 999px;
        background: rgba(125, 164, 255, 0.17);
        transform-origin: 50% 110px;
      }

      .clock-ghost::before {
        height: 158px;
      }

      .clock-ghost::after {
        height: 128px;
        transform: rotate(128deg);
      }

      .room-glow {
        position: absolute;
        right: -160px;
        top: -30px;
        width: 560px;
        height: 900px;
        background:
          linear-gradient(90deg, rgba(34, 217, 255, 0.00), rgba(34, 217, 255, 0.13)),
          radial-gradient(circle at 72% 48%, rgba(46, 255, 168, 0.12), transparent 34%);
        filter: blur(4px);
      }

      .desk {
        position: absolute;
        left: -80px;
        right: -80px;
        bottom: -88px;
        height: 220px;
        transform: rotate(-3deg);
        transform-origin: center;
        background:
          linear-gradient(110deg, rgba(22, 31, 58, 0.78), rgba(12, 18, 35, 0.96)),
          linear-gradient(90deg, rgba(139, 111, 255, 0.16), transparent 42%);
        box-shadow: 0 -26px 80px rgba(0, 0, 0, 0.34);
      }

      .notebook {
        position: absolute;
        left: 286px;
        bottom: 36px;
        width: 318px;
        height: 58px;
        border-radius: 12px 12px 9px 9px;
        transform: rotate(-3deg);
        background: linear-gradient(180deg, #1c2b58, #111a36);
        box-shadow:
          0 12px 28px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .pen {
        position: absolute;
        left: 334px;
        bottom: 76px;
        width: 214px;
        height: 12px;
        border-radius: 999px;
        transform: rotate(-4deg);
        background:
          linear-gradient(90deg, #101522 0 14%, #d2dae9 14% 17%, #222b44 17% 84%, #f0f5ff 84% 90%, #151a27 90% 100%);
        box-shadow: 0 9px 16px rgba(0, 0, 0, 0.36);
      }

      .copy {
        position: absolute;
        left: 86px;
        top: 146px;
        width: 500px;
      }

      .logo {
        width: 144px;
        height: 144px;
        border-radius: 35px;
        box-shadow:
          0 30px 70px rgba(34, 217, 255, 0.18),
          0 16px 34px rgba(139, 111, 255, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }

      .title {
        margin-top: 42px;
        color: #f6f9ff;
        font-size: 82px;
        font-weight: 880;
        line-height: 0.98;
        letter-spacing: 0;
        text-shadow: 0 22px 44px rgba(0, 0, 0, 0.30);
      }

      .title .accent {
        color: #22d9ff;
      }

      .subtitle {
        margin-top: 28px;
        color: rgba(237, 242, 255, 0.68);
        font-size: 32px;
        font-weight: 560;
        letter-spacing: 0;
      }

      .browser {
        position: absolute;
        left: 616px;
        top: 84px;
        width: 888px;
        height: 694px;
        border-radius: 22px;
        border: 1px solid rgba(237, 242, 255, 0.19);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.025)),
          rgba(8, 12, 24, 0.92);
        box-shadow:
          0 42px 92px rgba(0, 0, 0, 0.52),
          0 0 0 1px rgba(255, 255, 255, 0.035),
          inset 0 1px 0 rgba(255, 255, 255, 0.17);
        overflow: hidden;
      }

      .browser-head {
        height: 52px;
        display: flex;
        align-items: center;
        padding: 0 18px;
        gap: 10px;
        background: rgba(13, 17, 31, 0.94);
        border-bottom: 1px solid rgba(237, 242, 255, 0.12);
      }

      .mac-dot {
        width: 13px;
        height: 13px;
        border-radius: 50%;
      }

      .mac-dot.red {
        background: #ff5f57;
      }

      .mac-dot.yellow {
        background: #ffbd2e;
      }

      .mac-dot.green {
        background: #28c840;
      }

      .tab {
        margin-left: 10px;
        width: 280px;
        height: 42px;
        border-radius: 18px 18px 0 0;
        background: rgba(18, 24, 43, 0.96);
        border: 1px solid rgba(237, 242, 255, 0.09);
        border-bottom: 0;
        position: relative;
      }

      .tab::before,
      .tab::after {
        content: "";
        position: absolute;
        top: 18px;
        width: 12px;
        height: 2px;
        border-radius: 999px;
        background: rgba(237, 242, 255, 0.45);
      }

      .tab::before {
        right: 36px;
        transform: rotate(45deg);
      }

      .tab::after {
        right: 36px;
        transform: rotate(-45deg);
      }

      .plus {
        color: rgba(237, 242, 255, 0.82);
        font-size: 26px;
        line-height: 1;
        margin-left: 2px;
      }

      .toolbar {
        height: 54px;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 18px;
        background: rgba(9, 13, 24, 0.84);
        border-bottom: 1px solid rgba(237, 242, 255, 0.10);
      }

      .nav-icon {
        width: 20px;
        height: 20px;
        color: rgba(237, 242, 255, 0.70);
        font-size: 28px;
        line-height: 17px;
      }

      .search {
        flex: 1;
        height: 36px;
        border-radius: 999px;
        border: 1px solid rgba(237, 242, 255, 0.12);
        background: rgba(255, 255, 255, 0.055);
      }

      .extension-icon {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        padding: 4px;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 26px rgba(34, 217, 255, 0.20);
      }

      .browser-body {
        position: relative;
        height: calc(100% - 106px);
        background:
          radial-gradient(520px 320px at 58% 24%, rgba(34, 217, 255, 0.10), transparent 60%),
          linear-gradient(180deg, rgba(7, 10, 19, 0.80), rgba(6, 8, 16, 0.94));
      }

      .search-page {
        position: absolute;
        left: 38px;
        right: 250px;
        top: 122px;
        height: 50px;
        border-radius: 999px;
        border: 1px solid rgba(237, 242, 255, 0.10);
        background: rgba(255, 255, 255, 0.045);
      }

      .skeleton {
        position: absolute;
        left: 38px;
        top: 210px;
        display: grid;
        grid-template-columns: repeat(4, 76px);
        gap: 56px 36px;
        opacity: 0.46;
      }

      .tile {
        width: 76px;
      }

      .tile::before {
        content: "";
        display: block;
        height: 72px;
        border-radius: 14px;
        background: rgba(237, 242, 255, 0.075);
      }

      .tile::after {
        content: "";
        display: block;
        margin-top: 14px;
        width: 74px;
        height: 8px;
        border-radius: 999px;
        background:
          linear-gradient(90deg, rgba(237, 242, 255, 0.13) 0 78%, transparent 78%),
          rgba(237, 242, 255, 0.05);
        box-shadow: 0 14px 0 rgba(237, 242, 255, 0.08);
      }

      .popup {
        position: absolute;
        right: 46px;
        top: 188px;
        width: 430px;
        height: 602px;
        border-radius: 22px;
        overflow: hidden;
        border: 1px solid rgba(237, 242, 255, 0.18);
        background: #060810;
        box-shadow:
          0 36px 82px rgba(0, 0, 0, 0.58),
          0 0 0 1px rgba(255, 255, 255, 0.045),
          inset 0 1px 0 rgba(255, 255, 255, 0.10);
      }

      .popup::before {
        content: "";
        position: absolute;
        left: 364px;
        top: -18px;
        width: 36px;
        height: 36px;
        transform: rotate(45deg);
        border-left: 1px solid rgba(237, 242, 255, 0.18);
        border-top: 1px solid rgba(237, 242, 255, 0.18);
        background: #060810;
      }

      .popup img {
        position: absolute;
        left: 0;
        top: 0;
        width: 430px;
        height: 602px;
        object-fit: cover;
        object-position: top center;
      }

      .popup-sheen {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.12), transparent 20%, transparent 72%, rgba(34, 217, 255, 0.05)),
          linear-gradient(0deg, rgba(0, 0, 0, 0.06), transparent 50%);
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <div class="clock-ghost"></div>
      <div class="room-glow"></div>
      <div class="desk"></div>
      <div class="notebook"></div>
      <div class="pen"></div>

      <section class="copy" aria-label="Product name">
        <img class="logo" src="../new_logo.png" alt="" />
        <div class="title">Screen Time<br /><span class="accent">Manager</span></div>
        <div class="subtitle">Block distractions. Stay focused.</div>
      </section>

      <section class="browser" aria-label="Browser mockup">
        <div class="browser-head">
          <span class="mac-dot red"></span>
          <span class="mac-dot yellow"></span>
          <span class="mac-dot green"></span>
          <span class="tab"></span>
          <span class="plus">+</span>
        </div>
        <div class="toolbar">
          <span class="nav-icon">&#8592;</span>
          <span class="nav-icon">&#8594;</span>
          <span class="nav-icon">&#8635;</span>
          <span class="search"></span>
          <img class="extension-icon" src="../new_logo.png" alt="" />
          <span class="nav-icon">&#8942;</span>
        </div>
        <div class="browser-body">
          <div class="search-page"></div>
          <div class="skeleton" aria-hidden="true">
            <span class="tile"></span>
            <span class="tile"></span>
            <span class="tile"></span>
            <span class="tile"></span>
            <span class="tile"></span>
            <span class="tile"></span>
            <span class="tile"></span>
            <span class="tile"></span>
          </div>
        </div>
      </section>

      <aside class="popup" aria-label="Actual extension render">
        <img src="../assets/extension-dashboard-render.png" alt="" />
        <div class="popup-sheen"></div>
      </aside>
    </main>
  </body>
</html>
