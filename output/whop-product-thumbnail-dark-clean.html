<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1600px;
        height: 900px;
        overflow: hidden;
        background: #050711;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        position: relative;
      }

      .backdrop {
        position: absolute;
        inset: -120px;
        background:
          radial-gradient(640px 430px at 12% 16%, rgba(139, 111, 255, 0.32), transparent 64%),
          radial-gradient(620px 420px at 86% 12%, rgba(34, 217, 255, 0.25), transparent 62%),
          radial-gradient(760px 420px at 50% 105%, rgba(139, 111, 255, 0.14), transparent 62%),
          linear-gradient(135deg, #080a17 0%, #0a0e1d 52%, #040610 100%);
      }

      .noise {
        position: absolute;
        inset: 0;
        opacity: 0.35;
        background:
          linear-gradient(rgba(237, 242, 255, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(237, 242, 255, 0.045) 1px, transparent 1px);
        background-size: 64px 64px;
        mask-image: radial-gradient(circle at center, black 0%, transparent 76%);
      }

      .glow {
        position: absolute;
        left: 170px;
        right: 170px;
        top: 118px;
        height: 594px;
        border-radius: 52px;
        background: linear-gradient(110deg, rgba(139, 111, 255, 0.28), rgba(34, 217, 255, 0.22));
        filter: blur(38px);
      }

      .window {
        position: absolute;
        left: 178px;
        top: 92px;
        width: 1244px;
        height: 716px;
        border-radius: 34px;
        overflow: hidden;
        border: 1px solid rgba(237, 242, 255, 0.14);
        background: #070a15;
        box-shadow:
          0 54px 140px rgba(0, 0, 0, 0.60),
          0 0 0 1px rgba(255, 255, 255, 0.045),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .chrome {
        position: absolute;
        inset: 0 0 auto;
        height: 58px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 24px;
        border-bottom: 1px solid rgba(237, 242, 255, 0.10);
        background: rgba(6, 8, 17, 0.96);
        z-index: 2;
      }

      .dot {
        width: 13px;
        height: 13px;
        border-radius: 999px;
      }

      .dot.red {
        background: #ff5f57;
      }

      .dot.yellow {
        background: #ffbd2e;
      }

      .dot.green {
        background: #28c840;
      }

      .address {
        margin-left: 18px;
        width: 560px;
        height: 30px;
        border-radius: 999px;
        border: 1px solid rgba(237, 242, 255, 0.10);
        background: rgba(255, 255, 255, 0.045);
      }

      .shot {
        position: absolute;
        left: 0;
        top: 58px;
        width: 1244px;
        height: auto;
      }

      .shade {
        position: absolute;
        inset: 58px 0 0;
        background:
          linear-gradient(90deg, rgba(5, 7, 17, 0.05), transparent 18%, transparent 74%, rgba(5, 7, 17, 0.11)),
          linear-gradient(0deg, rgba(5, 7, 17, 0.16), transparent 50%);
      }

      .badge {
        position: absolute;
        left: 86px;
        bottom: 74px;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 15px 18px 15px 16px;
        border-radius: 24px;
        border: 1px solid rgba(237, 242, 255, 0.14);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.095), rgba(255, 255, 255, 0.04)),
          rgba(11, 15, 28, 0.84);
        box-shadow:
          0 24px 72px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px);
      }

      .badge img {
        width: 54px;
        height: 54px;
        border-radius: 16px;
      }

      .badge-text {
        color: #edf2ff;
        font-size: 24px;
        font-weight: 850;
        letter-spacing: 0;
        line-height: 1.05;
      }

      .badge-text span {
        color: #22d9ff;
      }

      .active-pill {
        position: absolute;
        right: 92px;
        top: 88px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 17px;
        border-radius: 999px;
        border: 1px solid rgba(46, 255, 168, 0.27);
        background: rgba(46, 255, 168, 0.095);
        color: #2effa8;
        font-size: 18px;
        font-weight: 850;
        box-shadow: 0 20px 58px rgba(0, 0, 0, 0.32);
      }

      .active-pill::before {
        content: "";
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #2effa8;
        box-shadow: 0 0 18px #2effa8;
      }
    </style>
  </head>
  <body>
    <div class="backdrop"></div>
    <div class="noise"></div>
    <div class="glow"></div>
    <section class="window" aria-label="Screen Time Manager dark dashboard">
      <div class="chrome">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="address"></span>
      </div>
      <img class="shot" src="../assets/extension-dashboard-render.png" alt="" />
      <div class="shade"></div>
    </section>
    <div class="badge">
      <img src="../new_logo.png" alt="" />
      <div class="badge-text">Screen Time<br /><span>Manager</span></div>
    </div>
    <div class="active-pill">2 active</div>
  </body>
</html>
