<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
      }

      img {
        width: 1024px;
        height: 1024px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <img src="../new_logo.png" alt="Screen Time Manager icon" />
  </body>
</html>
